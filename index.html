<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="dashboard">

        <!-- Mobile Overlay -->
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="notification">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge">3</span>
                </div>
                <div class="user-profile">
                    <img src="assets/images/user-profile.png" alt="User profile">
                </div>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-code"></i>
                <h1>Grid Dashboard</h1>
            </div>
            <div class="nav-title">Main Menu</div>
            <div class="nav-links">
                <a href="#" class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-project-diagram"></i>
                    <span>Projects</span>
                </a>                
                <a href="#" class="nav-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Calendar</span>
                </a>                                
                <a href="#" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Team</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
            <div class="nav-title">Team Members</div>
            <div class="nav-links">
                <div class="team-member">
                    <img class="member-avatar" src="/assets/images/member-1.png" alt="Team Member 1">
                    <span>Eleanor Vance</span>
                </div>
                <div class="team-member">
                    <img class="member-avatar" src="/assets/images/member-2.png" alt="Team Member 2">
                    <span>Maya Sterling</span>
                </div>
                <div class="team-member">
                    <img class="member-avatar" src="/assets/images/member-3.png" alt="Team Member 3">
                    <span>Jasper Thorne</span>
                </div>
                <div class="team-member">
                    <img class="member-avatar" src="/assets/images/member-4.png" alt="Team Member 4">
                    <span>Silas Mercer</span>
                </div>
                <div class="team-member">
                    <img class="member-avatar" src="/assets/images/member-5.png" alt="Team Member 5">
                    <span>Caleb Finch</span>
                </div>                                                
            </div>
        </aside>

        <!-- Main Content-->
        <main class="content">
            <!-- Welcome banner -->
             <div class="welcome-banner">
                <h1>Welcome back, Serhii!</h1>
                <p>You have 3 ongoing projects. 2 deadlines are approaching this week.</p>
                <button class="btn btn-light">
                    <i class="fas fa-plus"></i> Create New Project
                </button>
             </div>
        </main>

        <!-- Footer -->
        <footer class="footer"></footer>

    </div>
</body>
<script src="assets/js/script.js"></script>

</html>
